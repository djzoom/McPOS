version: "3.9"

services:
  katrec:
    build:
      context: ..
      dockerfile: Dockerfile
    image: katrec:latest
    working_dir: /app
    volumes:
      - ../assets:/app/assets:ro
      - ../data:/app/data
      - ../output:/app/output
    environment:
      - TZ=Etc/UTC
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: ["python", "scripts/local_picker/create_mixtape.py", "--no-remix", "--no-video"]
