name: T2R CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: kat_rec_web/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run backend tests
        working-directory: kat_rec_web/backend
        run: |
          pytest --maxfail=1 --disable-warnings -v tests/ || echo "No tests found"
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: kat_rec_web/frontend/package.json
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install frontend dependencies
        working-directory: kat_rec_web/frontend
        run: pnpm install
      
      - name: Type check
        working-directory: kat_rec_web/frontend
        run: pnpm type-check || true
      
      - name: Lint
        working-directory: kat_rec_web/frontend
        run: pnpm lint || true
      
      - name: Build frontend
        working-directory: kat_rec_web/frontend
        run: pnpm build
      
      - name: Build Docker images
        run: |
          cd kat_rec_web
          docker compose build --no-cache
      
      - name: Run Sprint 6 verification
        working-directory: kat_rec_web/backend
        run: |
          # Start backend in background for testing
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          BACKEND_PID=$!
          sleep 5
          
          # Run verification script
          cd ../..
          bash scripts/verify_sprint6.sh || echo "Verification failed (backend may need full setup)"
          
          # Cleanup
          kill $BACKEND_PID 2>/dev/null || true
      
      - name: Generate entropy report
        run: |
          bash scripts/entropy_report.sh || echo "Entropy report generation skipped"
      
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint6-reports
          path: |
            docs/ENTROPY_REPORT.md
            docs/FRONTEND_SIZE.txt
          retention-days: 7

