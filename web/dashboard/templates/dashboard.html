<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kat Records - 实时仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            margin-bottom: 30px;
        }
        
        h1 {
            color: #4a9eff;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .card h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #4a9eff;
        }
        
        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        
        .stat:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #aaa;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        .stat-value.success {
            color: #4ade80;
        }
        
        .stat-value.error {
            color: #f87171;
        }
        
        .stat-value.warning {
            color: #fbbf24;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4a9eff, #60a5fa);
            transition: width 0.3s ease;
        }
        
        .episode-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .episode-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #333;
            border-radius: 6px;
            border-left: 4px solid #4a9eff;
        }
        
        .episode-item.completed {
            border-left-color: #4ade80;
        }
        
        .episode-item.error {
            border-left-color: #f87171;
        }
        
        .episode-item.pending {
            border-left-color: #888;
        }
        
        .episode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .episode-id {
            font-weight: bold;
            color: #4a9eff;
        }
        
        .episode-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #444;
        }
        
        .episode-title {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }
        
        .events-feed {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .event-item {
            padding: 8px;
            margin-bottom: 5px;
            background: #333;
            border-radius: 4px;
            font-size: 12px;
            border-left: 3px solid #4a9eff;
        }
        
        .event-item.completed {
            border-left-color: #4ade80;
        }
        
        .event-item.failed {
            border-left-color: #f87171;
        }
        
        .event-time {
            color: #888;
            font-size: 11px;
        }
        
        .refresh-indicator {
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 12px;
        }
        
        .recover-btn {
            background: #f87171;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .recover-btn:hover {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 Kat Records - 实时仪表板</h1>
            <div class="subtitle">最后更新: <span id="last-update">--</span></div>
        </header>
        
        <div class="grid">
            <!-- 概览面板 -->
            <div class="card">
                <h2>📊 概览</h2>
                <div class="stat">
                    <span class="stat-label">总期数</span>
                    <span class="stat-value" id="total-episodes">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">已完成</span>
                    <span class="stat-value success" id="completed-count">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">失败</span>
                    <span class="stat-value error" id="failed-count">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">进行中</span>
                    <span class="stat-value warning" id="in-progress-count">--</span>
                </div>
                <div class="stat">
                    <span class="stat-label">成功率</span>
                    <span class="stat-value success" id="success-rate">--</span>
                </div>
            </div>
            
            <!-- 指标面板 -->
            <div class="card">
                <h2>⏱️ 阶段耗时</h2>
                <div id="stage-durations">
                    <div class="stat">
                        <span class="stat-label">加载中...</span>
                    </div>
                </div>
            </div>
            
            <!-- 活跃阶段 -->
            <div class="card">
                <h2>🔄 活跃阶段</h2>
                <div id="active-stages">
                    <div class="stat">
                        <span class="stat-label">混音中</span>
                        <span class="stat-value" id="remixing-count">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">渲染中</span>
                        <span class="stat-value" id="rendering-count">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">待制作</span>
                        <span class="stat-value" id="pending-count">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="grid" style="grid-template-columns: 2fr 1fr;">
            <!-- 期数列表 -->
            <div class="card">
                <h2>📋 期数列表</h2>
                <div class="episode-list" id="episode-list">
                    <div class="stat">
                        <span class="stat-label">加载中...</span>
                    </div>
                </div>
            </div>
            
            <!-- 最近事件 -->
            <div class="card">
                <h2>📰 最近事件</h2>
                <div class="events-feed" id="events-feed">
                    <div class="stat">
                        <span class="stat-label">加载中...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="refresh-indicator">
            <span id="refresh-status">自动刷新: 每10秒</span>
        </div>
    </div>
    
    <script>
        // 动态获取 API 基础路径（使用相对路径，避免端口问题）
        const API_BASE = window.location.origin;
        
        async function fetchSummary() {
            try {
                const response = await fetch(`/metrics/summary?period=24h`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                console.log('fetchSummary response:', data);
                return data;
            } catch (error) {
                console.error('获取摘要失败:', error);
                return null;
            }
        }
        
        async function fetchEpisodes() {
            try {
                const response = await fetch(`/metrics/episodes`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('获取期数失败:', error);
                return null;
            }
        }
        
        async function fetchEvents() {
            try {
                const response = await fetch(`/metrics/events?limit=20`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('获取事件失败:', error);
                return null;
            }
        }
        
        function updateOverview(summary) {
            console.log('updateOverview called with:', summary);
            if (!summary) {
                console.warn('summary is null or undefined');
                return;
            }
            if (!summary.global_state) {
                console.warn('summary.global_state is missing', summary);
                return;
            }
            
            const gs = summary.global_state;
            console.log('global_state:', gs);
            
            document.getElementById('total-episodes').textContent = gs.total_episodes || 0;
            document.getElementById('completed-count').textContent = gs.completed || 0;
            document.getElementById('failed-count').textContent = gs.error || 0;
            document.getElementById('in-progress-count').textContent = 
                (gs.remixing || 0) + (gs.rendering || 0);
            
            const total = gs.completed + gs.error;
            const successRate = total > 0 
                ? ((gs.completed / total) * 100).toFixed(1) + '%'
                : '0%';
            document.getElementById('success-rate').textContent = successRate;
            
            // 更新活跃阶段
            document.getElementById('remixing-count').textContent = gs.remixing || 0;
            document.getElementById('rendering-count').textContent = gs.rendering || 0;
            document.getElementById('pending-count').textContent = gs.pending || 0;
        }
        
        function updateStageDurations(summary) {
            if (!summary || !summary.stages) return;
            
            const container = document.getElementById('stage-durations');
            container.innerHTML = '';
            
            for (const [stage, stats] of Object.entries(summary.stages)) {
                const stat = document.createElement('div');
                stat.className = 'stat';
                
                const label = document.createElement('span');
                label.className = 'stat-label';
                label.textContent = stage.charAt(0).toUpperCase() + stage.slice(1);
                
                const value = document.createElement('span');
                value.className = 'stat-value';
                value.textContent = stats.avg_duration 
                    ? stats.avg_duration + 's' 
                    : '--';
                
                stat.appendChild(label);
                stat.appendChild(value);
                container.appendChild(stat);
            }
        }
        
        function updateEpisodes(episodesData) {
            if (!episodesData || !episodesData.episodes) return;
            
            const container = document.getElementById('episode-list');
            container.innerHTML = '';
            
            episodesData.episodes.slice(0, 20).forEach(ep => {
                const item = document.createElement('div');
                item.className = `episode-item ${ep.status}`;
                
                const header = document.createElement('div');
                header.className = 'episode-header';
                
                const id = document.createElement('span');
                id.className = 'episode-id';
                id.textContent = ep.episode_id || `#${ep.episode_number}`;
                
                const status = document.createElement('span');
                status.className = 'episode-status';
                // 状态显示映射（英文→中文）
                const statusDisplay = {
                    'pending': '待制作',
                    'remixing': '制作中',
                    'rendering': '渲染中',
                    'uploading': '上传中',
                    'completed': '已完成',
                    'error': '失败'
                };
                status.textContent = statusDisplay[ep.status] || ep.status || '待制作';
                
                header.appendChild(id);
                header.appendChild(status);
                
                if (ep.title) {
                    const title = document.createElement('div');
                    title.className = 'episode-title';
                    title.textContent = ep.title;
                    item.appendChild(title);
                }
                
                if (ep.status === 'error') {
                    const btn = document.createElement('button');
                    btn.className = 'recover-btn';
                    btn.textContent = '恢复';
                    btn.onclick = () => recoverEpisode(ep.episode_id);
                    item.appendChild(btn);
                }
                
                item.insertBefore(header, item.firstChild);
                container.appendChild(item);
            });
        }
        
        function updateEvents(eventsData) {
            if (!eventsData || !eventsData.events) return;
            
            const container = document.getElementById('events-feed');
            container.innerHTML = '';
            
            eventsData.events.slice(0, 15).forEach(event => {
                const item = document.createElement('div');
                item.className = `event-item ${event.status}`;
                
                const time = new Date(event.timestamp).toLocaleTimeString();
                
                item.innerHTML = `
                    <div class="event-time">${time}</div>
                    <div><strong>${event.stage}</strong> - ${event.status}</div>
                    ${event.episode_id ? `<div style="color: #888; font-size: 11px;">${event.episode_id}</div>` : ''}
                `;
                
                container.appendChild(item);
            });
        }
        
        async function recoverEpisode(episodeId) {
            if (!confirm(`确定要恢复期数 ${episodeId} 吗？`)) return;
            
            try {
                const response = await fetch(`/api/recover/${episodeId}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    alert('恢复成功！');
                    refreshDashboard();
                } else {
                    alert('恢复失败：' + await response.text());
                }
            } catch (error) {
                alert('恢复失败：' + error.message);
            }
        }
        
        async function refreshDashboard() {
            document.body.classList.add('loading');
            
            try {
                const [summary, episodes, events] = await Promise.all([
                    fetchSummary(),
                    fetchEpisodes(),
                    fetchEvents()
                ]);
                
                // 检查是否有数据
                if (!summary && !episodes && !events) {
                    console.warn('所有API请求都失败了，请检查服务器连接');
                    document.getElementById('refresh-status').textContent = 
                        `连接失败 - 请检查控制台或访问 /api/health 检查服务状态`;
                } else {
                    document.getElementById('refresh-status').textContent = 
                        `自动刷新: 每10秒 | 最后更新: ${new Date().toLocaleTimeString()}`;
                }
                
                updateOverview(summary);
                updateStageDurations(summary);
                updateEpisodes(episodes);
                updateEvents(events);
                
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('刷新仪表板失败:', error);
                document.getElementById('refresh-status').textContent = 
                    `错误: ${error.message} - 请检查服务器状态`;
            } finally {
                document.body.classList.remove('loading');
            }
        }
        
        // 初始加载
        refreshDashboard();
        
        // 每10秒自动刷新
        setInterval(refreshDashboard, 10000);
    </script>
</body>
</html>
